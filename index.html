<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중학교 자유 게시판</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="board-container">
        <h1>🏫 우리학교 자유 게시판</h1>
        
        <!-- 게시글 작성 구역 -->
        <div class="write-section">
            <h2>새 글 쓰기</h2>
            <form id="board-form">
                <input type="text" id="username" placeholder="작성자 (예: 2학년 1반 홍길동)" required>
                <input type="text" id="title" placeholder="글 제목을 입력하세요" required>
                <textarea id="content" placeholder="내용을 입력하세요" rows="5" required></textarea>
                <button type="submit">등록하기</button>
            </form>
        </div>

        <hr>

        <!-- 게시글 목록 구역 -->
        <div class="list-section">
            <h2>게시글 목록 (<span id="post-count">0</span>)</h2>
            <div id="posts-container">
                <!-- JavaScript로 작성된 글이 여기에 추가됩니다 -->
                <p class="no-posts">아직 등록된 글이 없습니다. 첫 글을 남겨보세요!</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
