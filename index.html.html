<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도파민 방지 스크롤 제한기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Apple SD Gothic Neo', sans-serif;
            background-color: #000;
            color: #fff;
            overflow-y: scroll;
        }

        /* 고정된 상단 인디케이터 */
        .status-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            z-index: 10;
            letter-spacing: 1px;
        }

        /* 가상의 숏폼 비디오 카드 세로 배열 */
        .video-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .video-card {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            border-bottom: 2px solid #222;
        }

        /* 홀수/짝수 카드 색상 구분 (숏폼 느낌 구현) */
        .video-card:nth-child(odd) { background-color: #111; }
        .video-card:nth-child(even) { background-color: #1a1a1a; }

        /* 경고 및 차단 팝업 레이어 */
        .warning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .warning-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .warning-box {
            text-align: center;
            padding: 30px;
            border-radius: 20px;
            background: #222;
            border: 2px solid #ff4757;
            max-width: 90%;
            width: 400px;
        }

        .warning-box h1 {
            color: #ff4757;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .warning-box p {
            color: #ccc;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn-reset {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

    <!-- 상단 스크롤 횟수 표시기 -->
    <div class="status-bar">
        남은 스크롤: <span id="remains">5</span>회 / 총 스크롤: <span id="count">0</span>
    </div>

    <!-- 가상의 숏폼 콘텐츠 -->
    <div class="video-container">
        <div class="video-card">📱 첫 번째 영상 콘텐츠</div>
        <div class="video-card">🍿 두 번째 영상 콘텐츠</div>
        <div class="video-card">🎵 세 번째 영상 콘텐츠</div>
        <div class="video-card">🐶 네 번째 영상 콘텐츠</div>
        <div class="video-card">🎮 다섯 번째 영상 콘텐츠</div>
        <div class="video-card">🌟 여섯 번째 영상 콘텐츠</div>
    </div>

    <!-- 제한 도달 시 차단 스크린 -->
    <div class="warning-overlay" id="warningOverlay">
        <div class="warning-box">
            <h1>🚨 도파민 디톡스!</h1>
            <p>오늘 설정한 숏폼 스크롤 제한(5회)에 도달했습니다.<br>이제 스마트폰을 내려놓고 휴식을 취하세요!</p>
            <button class="btn-reset" onclick="resetCounter()">내일 다시 도전하기</button>
        </div>
    </div>

    <script>
        let scrollCount = 0;
        const maxScroll = 5; // 최대 허용 스크롤 횟수
        let lastScrollTop = 0;
        let isThrottled = false; // 연속 스크롤 방지용 변수

        const countDisplay = document.getElementById('count');
        const remainsDisplay = document.getElementById('remains');
        const overlay = document.getElementById('warningOverlay');

        // 초기 화면 세팅
        remainsDisplay.innerText = maxScroll;

        // 스크롤 이벤트 감지
        window.addEventListener('scroll', () => {
            if (isThrottled) return; // 짧은 시간 내 연속 감지 차단

            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

            // 아래로 스크롤했을 때만 카운트 증가
            if (scrollTop > lastScrollTop) {
                isThrottled = true;
                scrollCount++;
                
                // UI 업데이트
                countDisplay.innerText = scrollCount;
                let remains = maxScroll - scrollCount;
                remainsDisplay.innerText = remains >= 0 ? remains : 0;

                // 제한 횟수 도달 검사
                if (scrollCount >= maxScroll) {
                    triggerBlock();
                }

                // 0.8초 동안 추가 스크롤 감지 안 함 (숏폼 한 페이지 넘기는 시간 고려)
                setTimeout(() => {
                    isThrottled = false;
                }, 800);
            }
            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
        });

        // 차단 팝업 띄우기 및 스크롤 금지
        function triggerBlock() {
            overlay.classList.add('show');
            document.body.style.overflow = 'hidden'; // 스크롤 완전히 막기
        }

        // 초기화 버튼 (테스트용)
        function resetCounter() {
            scrollCount = 0;
            countDisplay.innerText = scrollCount;
            remainsDisplay.innerText = maxScroll;
            overlay.classList.remove('show');
            document.body.style.overflow = 'scroll'; // 스크롤 복구
            window.scrollTo(0, 0); // 맨 위로 이동
        }
    </script>
</body>
</html>
